<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mis Gastos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:16px 16px 80px;max-width:500px;margin:0 auto}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
.tabs{display:flex;gap:3px;background:rgba(255,255,255,0.06);border-radius:10px;padding:3px}
.tab{background:none;border:none;color:#94a3b8;padding:6px 9px;border-radius:8px;font-size:14px}
.tab.active{background:rgba(255,255,255,0.13);color:#f1f5f9}
.section{display:none}.section.active{display:block}
.card{border-radius:12px;padding:12px 14px}
.badge{margin-left:3px;background:#6366f1;color:#fff;border-radius:99px;padding:1px 5px;font-size:10px}
.block{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.inp{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 12px;color:#f1f5f9;font-size:14px;outline:none}
.btn-purple{padding:10px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-size:13px;font-weight:600;width:100%;margin-top:4px}
.gasto-row{display:flex;gap:12px;align-items:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.cat-tag{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
.bar-track{height:6px;border-radius:99px;background:rgba(255,255,255,0.07);overflow:hidden;margin:6px 0}
.bar-fill{height:100%;border-radius:99px;transition:width 0.4s}
.empty{color:#475569;text-align:center;padding:50px 0;font-size:14px;line-height:1.8}
.feedback{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:none}
.toggle{display:flex;gap:6px;margin-bottom:12px}
.t-btn{flex:1;padding:10px 0;border-radius:11px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:13px;font-weight:600}
.t-btn.ac{border-color:#818cf8;background:rgba(129,140,248,0.2);color:#818cf8}
.t-btn.ap{border-color:#34d399;background:rgba(52,211,153,0.2);color:#34d399}
.t-auto{padding:10px 14px;border-radius:11px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#64748b;font-size:13px;font-weight:600}
.t-auto.aa{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#f1f5f9}
.hint-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:#94a3b8;padding:6px 12px;font-size:12px}
.send-btn{width:50px;height:50px;align-self:flex-end;background:#6366f1;border:none;border-radius:13px;color:#fff;font-size:22px;flex-shrink:0}
.send-btn:disabled{opacity:0.4}
.mes-btn{width:100%;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px;margin-bottom:8px;color:#e2e8f0;text-align:left}
.saved-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#34d399;color:#0f1117;padding:8px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99}
</style>
</head>
<body>

<div class="saved-toast" id="toast">✓ Guardado</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.08)">
  <div><div style="font-size:20px;font-weight:700">Mis Gastos</div><div style="font-size:12px;color:#64748b;margin-top:2px" id="mes-label"></div></div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('inicio',this)">🏠</button>
    <button class="tab" onclick="setTab('anotar',this)">✏️</button>
    <button class="tab" onclick="setTab('lista',this)" id="tab-lista">📋</button>
    <button class="tab" onclick="setTab('resumen',this)">📊</button>
    <button class="tab" onclick="setTab('historial',this)">🗂️</button>
    <button class="tab" onclick="setTab('patrimonio',this)">💎</button>
  </div>
</div>

<!-- INICIO -->
<div id="sec-inicio" class="section active">
  <div style="background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);border-radius:16px;padding:18px 20px;margin-bottom:12px">
    <div style="font-size:12px;color:#818cf8;font-weight:600;margin-bottom:4px">DISPONIBLE</div>
    <div style="font-size:32px;font-weight:800;letter-spacing:-1px" id="disponible-val">$ 0</div>
    <div style="font-size:12px;color:#64748b;margin-top:4px" id="disponible-sub"></div>
  </div>

  <div class="block" id="ritmo-block" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600" id="ritmo-label"></div>
      <div style="font-size:12px;color:#64748b" id="ritmo-dia"></div>
    </div>
    <div style="position:relative;height:8px;border-radius:99px;background:rgba(255,255,255,0.07);overflow:hidden;margin-bottom:6px">
      <div id="ritmo-esp" style="position:absolute;height:100%;border-radius:99px;background:rgba(255,255,255,0.15)"></div>
      <div id="ritmo-real" style="position:absolute;height:100%;border-radius:99px;background:#34d399;transition:width 0.5s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#475569">
      <span id="ritmo-pct-g"></span><span id="ritmo-pct-e"></span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div class="card" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09)">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">Gastos del mes</div>
      <div style="font-size:16px;font-weight:700" id="c-gastos">$ 0</div>
    </div>
    <div class="card" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2)">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">Cuotas este mes</div>
      <div style="font-size:16px;font-weight:700;color:#f87171" id="c-cuotas">$ 0</div>
    </div>
  </div>

  <!-- Ingresos -->
  <div class="block">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:13px;font-weight:600">💰 Ingresos</div>
      <button onclick="toggleIngreso()" style="background:rgba(255,255,255,0.08);border:none;color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:12px" id="btn-ingreso">Editar</button>
    </div>
    <div style="font-size:13px;color:#94a3b8;margin-top:6px" id="ingreso-resumen"></div>
    <div id="ingreso-form" style="display:none;margin-top:10px">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">Sueldo neto</div>
      <input class="inp" id="inp-sueldo" placeholder="ej: 500000" style="margin-bottom:8px">
      <div style="font-size:11px;color:#64748b;margin-bottom:4px">Deducciones (adelantos, etc)</div>
      <input class="inp" id="inp-deduc" placeholder="ej: 50000" style="margin-bottom:8px">
      <button class="btn-purple" onclick="guardarIngreso()">Guardar</button>
    </div>
  </div>

  <!-- Deudas -->
  <div class="block">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600">💳 Deudas en cuotas</div>
      <button onclick="toggleDeuda()" style="background:rgba(255,255,255,0.08);border:none;color:#94a3b8;border-radius:8px;padding:4px 10px;font-size:12px" id="btn-deuda">+</button>
    </div>
    <div id="deuda-form" style="display:none;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.07)">
      <input class="inp" id="inp-deuda-nombre" placeholder="Nombre (ej: iPhone - pareja)" style="margin-bottom:8px">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input class="inp" id="inp-deuda-total" placeholder="Monto total" style="flex:1">
        <input class="inp" id="inp-deuda-cuotas" placeholder="Cuotas" style="width:80px;flex:none">
      </div>
      <button class="btn-purple" onclick="agregarDeuda()">Agregar deuda</button>
    </div>
    <div id="deudas-list"></div>
  </div>

  <!-- Cerrar mes -->
  <div id="cerrar-wrap">
    <button onclick="document.getElementById('confirm-cierre').style.display='block';this.style.display='none'" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#64748b;font-size:13px;font-weight:600">Cerrar mes →</button>
    <div id="confirm-cierre" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:12px;padding:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px" id="confirm-title"></div>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:14px">Se archiva el mes y empieza en cero. Las deudas continúan.</div>
      <div style="display:flex;gap:8px">
        <button onclick="cerrarMes()" style="flex:1;padding:10px;border-radius:10px;border:none;background:#ef4444;color:#fff;font-size:13px;font-weight:600">Sí, cerrar</button>
        <button onclick="document.getElementById('confirm-cierre').style.display='none';document.querySelector('#cerrar-wrap>button').style.display=''" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:none;color:#94a3b8;font-size:13px;font-weight:600">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- ANOTAR -->
<div id="sec-anotar" class="section">
  <div class="feedback" id="feedback">
    <div style="display:flex;gap:12px;align-items:flex-start">
      <span style="font-size:28px" id="fb-emoji"></span>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600" id="fb-desc"></div>
        <div style="font-size:12px;color:#94a3b8;margin-top:3px" id="fb-meta"></div>
        <div style="margin-top:6px;display:flex;gap:6px;align-items:center">
          <span class="cat-tag" id="fb-tag"></span>
          <span style="font-size:12px;color:#34d399;margin-left:auto">✓ Guardado</span>
        </div>
      </div>
    </div>
  </div>
  <div class="toggle">
    <button class="t-btn" id="btn-comp" onclick="toggleComp()">½ Compartido</button>
    <button class="t-btn" id="btn-pers" onclick="togglePers()">Personal</button>
    <button class="t-auto aa" id="btn-auto" onclick="toggleAuto()">Auto</button>
  </div>
  <div style="display:flex;gap:8px">
    <textarea id="txt-input" rows="3" class="inp" style="flex:1;resize:none;line-height:1.5;border-radius:14px;padding:14px 16px;font-size:15px" placeholder="Describí el gasto...&#10;&quot;nafta 8500&quot; / &quot;supermercado 12000&quot;" oninput="checkBtn()" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="submit()" disabled>→</button>
  </div>
  <div style="margin-top:14px">
    <div style="font-size:11px;color:#475569;margin-bottom:8px;font-weight:600;letter-spacing:0.5px">EJEMPLOS</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      <button class="hint-btn" onclick="hint('nafta 8500')">nafta 8500</button>
      <button class="hint-btn" onclick="hint('supermercado 12000')">supermercado 12000</button>
      <button class="hint-btn" onclick="hint('Netflix 6000')">Netflix 6000</button>
      <button class="hint-btn" onclick="hint('arena gatos 2400')">arena gatos 2400</button>
      <button class="hint-btn" onclick="hint('celular 4500')">celular 4500</button>
      <button class="hint-btn" onclick="hint('alquiler 180000')">alquiler 180000</button>
    </div>
  </div>
</div>

<!-- LISTA -->
<div id="sec-lista" class="section"><div id="lista-content"></div></div>
<!-- RESUMEN -->
<div id="sec-resumen" class="section"><div id="resumen-content"></div></div>
<!-- HISTORIAL -->
<div id="sec-historial" class="section"><div id="historial-content"></div></div>
<!-- PATRIMONIO -->
<div id="sec-patrimonio" class="section"><div id="patrimonio-content"></div></div>

<script>
const CATS={vivienda:{e:"🏠",l:"Vivienda",comp:true,c:"#6366f1",keys:["alquiler","expensa","expensas","vivienda"]},servicios:{e:"💡",l:"Servicios",comp:true,c:"#f59e0b",keys:["luz","gas","agua","electricidad","servicio"]},internet:{e:"📶",l:"Internet",comp:true,c:"#3b82f6",keys:["internet","wifi","cablevision","fibertel","telecentro"]},supermercado:{e:"🛒",l:"Supermercado",comp:true,c:"#10b981",keys:["super","supermercado","almacen","carniceria","mercado","compras","chino","yerba","mate","pan","panaderia","kiosco","bizcochito","galletita"]},verduleria:{e:"🥬",l:"Verdulería",comp:true,c:"#22c55e",keys:["verduleria","verdura","verduras","feria","fruta","frutas","fruteria","tomate","lechuga","cebolla","papa"]},gatos:{e:"🐱",l:"Gatos",comp:true,c:"#ec4899",keys:["comida de gatos","comida de michis","comida michis","comida gatos","gato","gatos","michi","michis","arena","veterinario","vet","whiskas","gatito"]},auto:{e:"🚗",l:"Auto",comp:false,c:"#64748b",keys:["nafta","estacion","shell","ypf","axion","patente","peaje","garage","gnc","combustible"]},transporte:{e:"🚌",l:"Transporte",comp:false,c:"#0ea5e9",keys:["sube","colectivo","subte","tren","uber","taxi","remis"]},comunicaciones:{e:"📱",l:"Comunicaciones",comp:false,c:"#8b5cf6",keys:["celular","telefono","claro","movistar","tuenti","recarga","datos"]},suscripciones:{e:"🔁",l:"Suscripciones",comp:false,c:"#06b6d4",keys:["netflix","spotify","amazon","disney","hbo","max","suscripcion","prime","youtube","icloud","apple","flow","streaming"]},tabaco:{e:"🚬",l:"Tabaco",comp:false,c:"#78716c",keys:["tabaco","cigarro","cigarrillo","cigarrillos","camel","marlboro","lucky"]},salud:{e:"🏥",l:"Salud",comp:false,c:"#ef4444",keys:["doctor","medico","farmacia","medicamento","remedio","clinica","hospital","prepaga","osde"]},restaurante:{e:"🍽️",l:"Restaurante",comp:false,c:"#f97316",keys:["restaurante","cafe","delivery","pedidosya","rappi","bar","pizza","sushi","hamburguesa","resto"]},ropa:{e:"👕",l:"Ropa",comp:false,c:"#a855f7",keys:["ropa","remera","pantalon","zapatillas","zapatos","buzo","campera","calzado","jean"]},otro:{e:"📌",l:"Otro",comp:false,c:"#94a3b8",keys:[]}};
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function mesActual(){const d=new Date();return`${MESES[d.getMonth()]} ${d.getFullYear()}`;}
function fmt(n){return"$ "+Math.round(n).toLocaleString("es-AR");}
function toast(msg="✓ Guardado"){const t=document.getElementById("toast");t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1800);}



// ── Estado ───────────────────────────────────────────────────────────────────
let gastos=[],historial=[],ingresos={sueldo:0,deducciones:0},deudas=[],forzar=null;

function load(){
  try{gastos=JSON.parse(localStorage.getItem("g4_gastos")||"[]")}catch{}
  try{historial=JSON.parse(localStorage.getItem("g4_historial")||"[]")}catch{}
  try{ingresos=JSON.parse(localStorage.getItem("g4_ingresos")||'{"sueldo":0,"deducciones":0}')}catch{}
  try{deudas=JSON.parse(localStorage.getItem("g4_deudas")||"[]")}catch{}
  refresh();
}

function persist(){
  localStorage.setItem("g4_gastos",JSON.stringify(gastos));
  localStorage.setItem("g4_historial",JSON.stringify(historial));
  localStorage.setItem("g4_ingresos",JSON.stringify(ingresos));
  localStorage.setItem("g4_deudas",JSON.stringify(deudas));
  refresh();
}

function refresh(){
  document.getElementById("mes-label").textContent=mesActual();
  document.getElementById("confirm-title").textContent=`¿Cerrar ${mesActual()}?`;

  const totalG=gastos.reduce((s,g)=>s+(g.miMonto||0),0);
  const totalC=deudas.reduce((s,d)=>s+(d.pagadas<d.cuotas?Math.round(d.monto/d.cuotas):0),0);
  const disp=ingresos.sueldo>0?ingresos.sueldo-ingresos.deducciones-totalG-totalC:0;
  const d=new Date(),dia=d.getDate(),diasMes=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  const pctG=ingresos.sueldo>0?Math.min((totalG+totalC)/ingresos.sueldo*100,100):0;
  const pctE=dia/diasMes*100;
  const diff=pctG-pctE;

  const dispEl=document.getElementById("disponible-val");
  if(ingresos.sueldo===0){
    dispEl.textContent="Sin sueldo cargado";dispEl.style.color="#64748b";dispEl.style.fontSize="20px";
  } else {
    dispEl.textContent=fmt(disp);dispEl.style.color=disp>=0?"#f1f5f9":"#ef4444";dispEl.style.fontSize="32px";
  }
  document.getElementById("disponible-sub").textContent=ingresos.sueldo>0?`Sueldo ${fmt(ingresos.sueldo)} · Deduc. ${fmt(ingresos.deducciones)}`:"Editá ingresos para ver tu saldo";
  document.getElementById("c-gastos").textContent=fmt(totalG);
  document.getElementById("c-cuotas").textContent=fmt(totalC);
  document.getElementById("ingreso-resumen").textContent=ingresos.sueldo>0?`Sueldo: ${fmt(ingresos.sueldo)} · Deduc: ${fmt(ingresos.deducciones)}`:"No cargado";

  const rb=document.getElementById("ritmo-block");
  if(ingresos.sueldo>0){
    rb.style.display="block";
    const color=diff>15?"#ef4444":diff>5?"#f59e0b":"#34d399";
    const label=diff>15?"⚡ Gastando rápido":diff>5?"⚠️ Un poco acelerado":"✅ Buen ritmo";
    document.getElementById("ritmo-label").textContent=label;
    document.getElementById("ritmo-label").style.color=color;
    document.getElementById("ritmo-dia").textContent=`Día ${dia}/${diasMes}`;
    document.getElementById("ritmo-esp").style.width=pctE+"%";
    document.getElementById("ritmo-real").style.width=pctG+"%";
    document.getElementById("ritmo-real").style.background=color;
    document.getElementById("ritmo-pct-g").textContent=`Gastado: ${pctG.toFixed(0)}%`;
    document.getElementById("ritmo-pct-e").textContent=`Esperado: ${pctE.toFixed(0)}%`;
  } else rb.style.display="none";

  document.getElementById("tab-lista").innerHTML='📋'+(gastos.length?`<span class="badge">${gastos.length}</span>`:'');
  renderDeudas();renderLista();renderResumen(gastos,null,document.getElementById("resumen-content"));renderHistorial();
}

function parseText(text){
  const t=text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const m=t.match(/\$?\s*([\d]+(?:[.,]\d{3})*(?:[.,]\d{1,2})?)/);
  let monto=0;
  if(m){const r=m[1].replace(/\./g,"").replace(/,/g,".");monto=parseFloat(r)||0;if(monto<10&&m[1].includes("."))monto*=1000;}
  let catKey="otro",best=0;
  for(const[k,cfg]of Object.entries(CATS)){if(k==="otro")continue;for(const kw of cfg.keys){if(t.includes(kw)&&kw.length>best){best=kw.length;catKey=k;}}}
  const forceC=/compartido|compartida|la mitad|mi parte|mi mitad/.test(t);
  const forceP=/personal|solo yo/.test(t);
  const cfg=CATS[catKey];let esComp=cfg.comp;
  if(forceC)esComp=true;if(forceP)esComp=false;
  const yaDiv=/la mitad|mi parte|mi mitad/.test(t);
  const montoTotal=yaDiv?monto*2:monto,miMonto=yaDiv?monto:(esComp?monto/2:monto);
  const desc=text.replace(/\$?\s*[\d.,]+/g,"").replace(/\b(pague|pago|gaste|gasto|compre|compra|la mitad|mi parte|compartido|compartida|personal|hoy|ayer)\b/gi,"").replace(/\s+/g," ").trim()||cfg.l;
  return{desc,montoTotal,esComp,miMonto,catKey};
}

function submit(){
  const inp=document.getElementById("txt-input"),text=inp.value.trim();if(!text)return;
  const p=parseText(text);
  if(forzar!==null){p.esComp=forzar;p.miMonto=forzar?p.montoTotal/2:p.montoTotal;}
  const g={id:Date.now(),fecha:new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"}),raw:text,...p};
  gastos.unshift(g);persist();showFeedback(g);inp.value="";checkBtn();forzar=null;updateToggle();
}

function showFeedback(g){
  const cfg=CATS[g.catKey]||CATS.otro;
  document.getElementById("fb-emoji").textContent=cfg.e;
  document.getElementById("fb-desc").textContent=g.desc||cfg.l;
  document.getElementById("fb-meta").textContent=g.esComp?`Compartido · Tu parte: ${fmt(g.miMonto)} (total ${fmt(g.montoTotal)})`:`Personal · ${fmt(g.miMonto)}`;
  const tag=document.getElementById("fb-tag");tag.textContent=cfg.l;tag.style.background=cfg.c+"22";tag.style.color=cfg.c;
  document.getElementById("feedback").style.display="block";
}

function renderDeudas(){
  const el=document.getElementById("deudas-list");
  if(!deudas.length){el.innerHTML='<div style="font-size:13px;color:#475569">Sin deudas registradas</div>';return;}
  el.innerHTML=deudas.map((d,i)=>{
    const pct=d.cuotas>0?(d.pagadas/d.cuotas)*100:0,cuota=Math.round(d.monto/d.cuotas),term=d.pagadas>=d.cuotas;
    return`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.05)">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <div style="font-size:13px;font-weight:600;color:${term?"#475569":"#f1f5f9"}">${d.nombre}${term?" ✓":""}</div>
        <div style="font-size:12px;color:#64748b">${d.pagadas}/${d.cuotas} cuotas</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="background:${term?"#34d399":"#818cf8"};width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:#64748b">${term?"✓ Pagada completa":`Cuota: ${fmt(cuota)} · Resta: ${fmt(d.monto-d.pagadas*cuota)}`}</div>
        <div style="display:flex;gap:6px">
          ${!term?`<button onclick="pagarCuota(${i})" style="background:rgba(129,140,248,0.2);border:1px solid rgba(129,140,248,0.3);color:#818cf8;border-radius:8px;padding:3px 10px;font-size:12px">Pagar cuota</button>`:""}
          <button onclick="elimDeuda(${i})" style="background:none;border:none;color:#475569;font-size:16px">×</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderLista(){
  const el=document.getElementById("lista-content");
  if(!gastos.length){el.innerHTML='<div class="empty">Sin gastos aún.<br>Anotá el primero →</div>';return;}
  el.innerHTML=gastos.map((g,i)=>{
    const cfg=CATS[g.catKey]||CATS.otro;
    return`<div class="gasto-row">
      <div style="width:42px;height:42px;border-radius:11px;background:${cfg.c}20;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${cfg.e}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500;margin-bottom:3px">${g.desc||cfg.l}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span class="cat-tag" style="background:${cfg.c}22;color:${cfg.c}">${cfg.l}</span>
          ${g.esComp?'<span style="font-size:11px;color:#818cf8">½</span>':""}
          <span style="font-size:11px;color:#475569">${g.fecha}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:15px;font-weight:700">${fmt(g.miMonto)}</div>
        ${g.esComp?`<div style="font-size:11px;color:#475569">(${fmt(g.montoTotal)})</div>`:""}
      </div>
      <button onclick="elimGasto(${i})" style="background:none;border:none;color:#475569;font-size:20px;padding:0 4px">×</button>
    </div>`;
  }).join("");
}

function renderResumen(gs,tot,el){
  if(!gs||!gs.length){el.innerHTML='<div class="empty">Sin gastos</div>';return;}
  const ct={};gs.forEach(g=>{ct[g.catKey]=(ct[g.catKey]||0)+(g.miMonto||0);});
  const rows=Object.entries(ct).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({k,v,...(CATS[k]||CATS.otro)}));
  const total=tot||rows.reduce((s,d)=>s+d.v,0);
  let svg=`<svg viewBox="0 0 220 220" style="width:100%;max-width:220px;display:block;margin:0 auto 20px">`;
  let angle=-Math.PI/2;const cx=110,cy=110,r=90,ri=52;
  rows.forEach(d=>{
    const pct=total>0?d.v/total:0;if(pct<0.001)return;
    const a2=angle+pct*2*Math.PI,lg=pct>0.5?1:0;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle),xi2=cx+ri*Math.cos(a2),yi2=cy+ri*Math.sin(a2);
    svg+=`<path d="M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${lg} 0 ${xi1} ${yi1} Z" fill="${d.c}" opacity="0.9" stroke="#0f1117" stroke-width="2"/>`;
    angle=a2;
  });
  svg+=`<text x="${cx}" y="${cy-8}" text-anchor="middle" fill="#94a3b8" font-size="11">Total</text><text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">$${Math.round(total).toLocaleString("es-AR")}</text></svg>`;
  const bars=rows.map(d=>{const pct=total>0?d.v/total*100:0;return`<div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px 14px;margin-bottom:8px">
    <span style="font-size:20px;flex-shrink:0">${d.e}</span>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:13px;font-weight:600">${d.l}</span><span style="font-size:13px;font-weight:700">${fmt(d.v)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="background:${d.c};width:${pct}%"></div></div>
    </div>
    <span style="font-size:12px;color:#64748b;min-width:30px;text-align:right">${pct.toFixed(0)}%</span>
  </div>`;}).join("");
  el.innerHTML=svg+bars;
}

function renderHistorial(){
  const el=document.getElementById("historial-content");
  if(!historial.length){el.innerHTML='<div class="empty">No hay meses cerrados todavía</div>';return;}
  el.innerHTML=historial.map((h,i)=>`<button class="mes-btn" onclick="verMes(${i})">
    <div><div style="font-size:15px;font-weight:600">${h.mes}</div><div style="font-size:12px;color:#64748b;margin-top:2px">${h.gastos.length} gastos · Sueldo ${fmt(h.ingresos?h.ingresos.sueldo:0)}</div></div>
    <div style="text-align:right"><div style="font-size:16px;font-weight:700">${fmt(h.total)}</div><div style="font-size:11px;color:#475569;margin-top:2px">ver →</div></div>
  </button>`).join("");
}

function verMes(i){
  const h=historial[i],el=document.getElementById("historial-content");
  const ahorro=h.ingresos?h.ingresos.sueldo-h.ingresos.deducciones-h.total:0;
  el.innerHTML=`<button onclick="renderHistorial()" style="background:none;border:none;color:#818cf8;font-size:13px;font-weight:600;padding:0 0 16px;display:block">← Volver</button>
  <div style="font-size:18px;font-weight:700;margin-bottom:12px">${h.mes}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
    <div class="card" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09)"><div style="font-size:11px;color:#64748b;margin-bottom:4px">Sueldo</div><div style="font-size:15px;font-weight:700">${fmt(h.ingresos?h.ingresos.sueldo:0)}</div></div>
    <div class="card" style="background:${ahorro>=0?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)"};border:1px solid ${ahorro>=0?"rgba(16,185,129,0.25)":"rgba(239,68,68,0.25)"}"><div style="font-size:11px;color:#64748b;margin-bottom:4px">Ahorro</div><div style="font-size:15px;font-weight:700;color:${ahorro>=0?"#34d399":"#f87171"}">${fmt(ahorro)}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px">
    <div class="card" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09)"><div style="font-size:11px;color:#64748b;margin-bottom:4px">Total</div><div style="font-size:15px;font-weight:700">${fmt(h.total)}</div></div>
    <div class="card" style="background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25)"><div style="font-size:11px;color:#64748b;margin-bottom:4px">Compartidos</div><div style="font-size:15px;font-weight:700;color:#818cf8">${fmt(h.comp)}</div></div>
    <div class="card" style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25)"><div style="font-size:11px;color:#64748b;margin-bottom:4px">Personales</div><div style="font-size:15px;font-weight:700;color:#34d399">${fmt(h.pers)}</div></div>
  </div><div id="hist-res"></div>`;
  renderResumen(h.gastos,h.total,document.getElementById("hist-res"));
}

function cerrarMes(){
  const total=gastos.reduce((s,g)=>s+(g.miMonto||0),0);
  const comp=gastos.filter(g=>g.esComp).reduce((s,g)=>s+(g.miMonto||0),0);
  const pers=gastos.filter(g=>!g.esComp).reduce((s,g)=>s+(g.miMonto||0),0);
  historial.unshift({mes:mesActual(),total,comp,pers,gastos:[...gastos],ingresos:{...ingresos}});
  gastos=[];ingresos={sueldo:0,deducciones:0};
  // Deudas persisten, no se resetean
  persist();toast("✓ Mes cerrado");
  document.getElementById("confirm-cierre").style.display="none";
  const btn=document.querySelector("#cerrar-wrap>button");if(btn)btn.style.display="";
  setTab("inicio",document.querySelector(".tab"));
}

function pagarCuota(i){deudas[i].pagadas=Math.min(deudas[i].pagadas+1,deudas[i].cuotas);persist();toast("✓ Cuota registrada");}
function elimDeuda(i){if(confirm("¿Eliminar esta deuda?")){{deudas.splice(i,1);persist();}}}
function elimGasto(i){gastos.splice(i,1);persist();}

function toggleIngreso(){
  const f=document.getElementById("ingreso-form"),b=document.getElementById("btn-ingreso");
  const show=f.style.display==="none";f.style.display=show?"block":"none";b.textContent=show?"Cerrar":"Editar";
}
function guardarIngreso(){
  const s=parseFloat(document.getElementById("inp-sueldo").value.replace(/\./g,"").replace(",","."))||0;
  const d=parseFloat(document.getElementById("inp-deduc").value.replace(/\./g,"").replace(",","."))||0;
  ingresos={sueldo:s,deducciones:d};persist();toast();
  document.getElementById("ingreso-form").style.display="none";
  document.getElementById("btn-ingreso").textContent="Editar";
  document.getElementById("inp-sueldo").value="";document.getElementById("inp-deduc").value="";
}
function toggleDeuda(){
  const f=document.getElementById("deuda-form"),b=document.getElementById("btn-deuda");
  const show=f.style.display==="none";f.style.display=show?"block":"none";b.textContent=show?"Cancelar":"+";
}
function agregarDeuda(){
  const n=document.getElementById("inp-deuda-nombre").value.trim();
  const t=parseFloat(document.getElementById("inp-deuda-total").value.replace(/\./g,"").replace(",","."))||0;
  const c=parseInt(document.getElementById("inp-deuda-cuotas").value)||1;
  if(!n||!t)return;
  deudas.push({id:Date.now(),nombre:n,monto:t,cuotas:c,pagadas:0});persist();toast("✓ Deuda agregada");
  document.getElementById("inp-deuda-nombre").value="";document.getElementById("inp-deuda-total").value="";document.getElementById("inp-deuda-cuotas").value="";
  document.getElementById("deuda-form").style.display="none";document.getElementById("btn-deuda").textContent="+";
}


// ── Patrimonio ────────────────────────────────────────────────────────────────
let inversiones=[];
try{inversiones=JSON.parse(localStorage.getItem("g4_inversiones")||"[]")}catch{}

function saveInversiones(){localStorage.setItem("g4_inversiones",JSON.stringify(inversiones));}

function renderPatrimonio(){
  const el=document.getElementById("patrimonio-content");

  // Calcular ahorro acumulado del historial
  let ahorroAcum=0;
  const ahorroMeses=historial.slice().reverse().map(h=>{
    const ahorro=h.ingresos?h.ingresos.sueldo-h.ingresos.deducciones-h.total:0;
    ahorroAcum+=ahorro;
    return{mes:h.mes,ahorro,acum:ahorroAcum};
  });
  const totalAhorro=ahorroAcum;

  // Calcular valor inversiones
  const hoy=new Date();
  const totalInv=0;
  const patrimTotal=totalAhorro;

  el.innerHTML=`
    <div style="background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(16,185,129,0.15));border:1px solid rgba(99,102,241,0.3);border-radius:16px;padding:18px 20px;margin-bottom:12px">
      <div style="font-size:12px;color:#818cf8;font-weight:600;margin-bottom:4px">PATRIMONIO TOTAL</div>
      <div style="font-size:30px;font-weight:800;letter-spacing:-1px;color:#f1f5f9">${fmt(patrimTotal)}</div>
      <div style="display:flex;gap:16px;margin-top:8px">
        <div><div style="font-size:11px;color:#64748b">Ahorro</div><div style="font-size:13px;font-weight:600;color:#34d399">${fmt(totalAhorro)}</div></div>

      </div>
    </div>

    <!-- Ahorro por mes -->
    <div class="block">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">📈 Ahorro acumulado</div>
      ${ahorroMeses.length===0?'<div style="font-size:13px;color:#475569">Sin historial aún</div>':
        ahorroMeses.map(m=>{
          const color=m.ahorro>=0?"#34d399":"#f87171";
          return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <div style="font-size:13px;color:#94a3b8">${m.mes}</div>
            <div style="text-align:right">
              <div style="font-size:13px;font-weight:600;color:${color}">${m.ahorro>=0?"+":""}${fmt(m.ahorro)}</div>
              <div style="font-size:11px;color:#475569">Acum: ${fmt(m.acum)}</div>
            </div>
          </div>`;
        }).join("")
      }
    </div>

  `;
}

function toggleFormInv(){
  const f=document.getElementById("form-inv");
  if(f)f.style.display=f.style.display==="none"?"block":"none";
}
function agregarInversion(){
  const n=document.getElementById("inv-nombre").value.trim();
  const m=parseFloat(document.getElementById("inv-monto").value.replace(/\./g,"").replace(",","."))||0;
  const t=parseFloat(document.getElementById("inv-tna").value)||0;
  if(!n||!m)return;
  inversiones.push({id:Date.now(),nombre:n,monto:m,tna:t,fecha:new Date().toISOString().split("T")[0]});
  saveInversiones();toast("✓ Inversión agregada");renderPatrimonio();
}
function elimInv(i){if(confirm("¿Eliminar?")){{inversiones.splice(i,1);saveInversiones();renderPatrimonio();}}}

function setTab(t,btn){
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  if(btn)btn.classList.add("active");
  else{const b=document.querySelector(`button[onclick*="'${t}'"]`);if(b)b.classList.add("active");}
  document.getElementById("sec-"+t).classList.add("active");
  if(t==="patrimonio")renderPatrimonio();
}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit();}}
function checkBtn(){document.getElementById("send-btn").disabled=!document.getElementById("txt-input").value.trim();}
function hint(h){document.getElementById("txt-input").value=h;checkBtn();}
function toggleComp(){forzar=forzar===true?null:true;updateToggle();}
function togglePers(){forzar=forzar===false?null:false;updateToggle();}
function toggleAuto(){forzar=null;updateToggle();}
function updateToggle(){
  document.getElementById("btn-comp").className="t-btn"+(forzar===true?" ac":"");
  document.getElementById("btn-pers").className="t-btn"+(forzar===false?" ap":"");
  document.getElementById("btn-auto").className="t-auto"+(forzar===null?" aa":"");
}
load();
</script>
